<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Calorie Tracker</h1>
            <p class="date-display" id="date-display"></p>
            <div class="goal-display">
                <span>Daily Goal:</span>
                <button class="goal-btn" id="goal-btn" aria-label="Edit goal">
                    <span id="goal-value">2000</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
            </div>
            <input type="number" id="goal-input" class="goal-input hidden" min="500" max="10000" step="50">
        </header>

        <section class="progress-section">
            <div class="progress-container">
                <div class="progress-ring">
                    <svg viewBox="0 0 120 120">
                        <circle class="progress-bg" cx="60" cy="60" r="52"/>
                        <circle class="progress-bar" id="progress-bar" cx="60" cy="60" r="52"/>
                    </svg>
                    <div class="progress-text">
                        <span class="calorie-count" id="calorie-count">0</span>
                        <span class="calorie-label">consumed</span>
                    </div>
                </div>
                <div class="progress-stats">
                    <div class="stat remaining">
                        <span class="stat-value" id="remaining-value">2000</span>
                        <span class="stat-label">remaining</span>
                    </div>
                    <div class="stat meals">
                        <span class="stat-value" id="meals-value">0</span>
                        <span class="stat-label">entries</span>
                    </div>
                </div>
            </div>
            <div class="macros-summary">
                <div class="macro">
                    <span class="macro-value" id="protein-total">0</span>
                    <span class="macro-label">Protein</span>
                </div>
                <div class="macro">
                    <span class="macro-value" id="carbs-total">0</span>
                    <span class="macro-label">Carbs</span>
                </div>
                <div class="macro">
                    <span class="macro-value" id="fat-total">0</span>
                    <span class="macro-label">Fat</span>
                </div>
            </div>
        </section>

        <form id="add-form" class="add-form">
            <div class="form-row">
                <input type="text" id="food-name" placeholder="Food name" autocomplete="off" required>
            </div>
            <div class="form-row-inline">
                <input type="number" id="food-calories" placeholder="Calories" min="0" max="10000" required>
                <input type="number" id="food-protein" placeholder="Protein" min="0" max="1000">
                <input type="number" id="food-carbs" placeholder="Carbs" min="0" max="1000">
                <input type="number" id="food-fat" placeholder="Fat" min="0" max="1000">
            </div>
            <button type="submit" id="add-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Entry
            </button>
        </form>

        <section class="food-log">
            <h2>Today's Food</h2>
            <ul id="food-list"></ul>
            <div class="empty-state" id="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                    <line x1="6" y1="1" x2="6" y2="4"></line>
                    <line x1="10" y1="1" x2="10" y2="4"></line>
                    <line x1="14" y1="1" x2="14" y2="4"></line>
                </svg>
                <p>No entries yet</p>
                <span>Add your first meal to get started</span>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>

</html>
